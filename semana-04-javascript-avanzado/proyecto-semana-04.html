<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscador de Usuarios GitHub</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        min-height: 100vh;
        padding: 32px 24px;
      }

      .app {
        max-width: 800px;
        margin: 0 auto;
      }

      /* HEADER */
      .header {
        text-align: center;
        margin-bottom: 32px;
      }

      .header h1 {
        font-size: 28px;
        color: #58a6ff;
        margin-bottom: 8px;
      }

      .header p {
        color: #8b949e;
        font-size: 14px;
      }

      /* BUSCADOR */
      .buscador {
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }

      .buscador input {
        flex: 1;
        padding: 12px 16px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 8px;
        color: #e6edf3;
        font-size: 15px;
      }

      .buscador input:focus {
        outline: none;
        border-color: #58a6ff;
      }

      .buscador input::placeholder {
        color: #8b949e;
      }

      .btn {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: opacity 0.2s;
      }

      .btn:hover {
        opacity: 0.85;
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-primario {
        background: #238636;
        color: white;
      }
      .btn-secundario {
        background: #21262d;
        color: #e6edf3;
        border: 1px solid #30363d;
      }

      /* HISTORIAL */
      .historial {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 16px;
        min-height: 28px;
      }

      .chip {
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 20px;
        padding: 3px 12px;
        font-size: 12px;
        color: #8b949e;
        cursor: pointer;
        transition: all 0.2s;
      }

      .chip:hover {
        border-color: #58a6ff;
        color: #58a6ff;
      }

      /* ESTADO */
      .estado {
        text-align: center;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .estado.cargando {
        background: #161b22;
        color: #58a6ff;
      }
      .estado.error {
        background: #1c0e10;
        color: #f85149;
        border: 1px solid #3d1a1c;
      }
      .estado.vacio {
        background: #161b22;
        color: #8b949e;
      }

      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #30363d;
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* PERFIL */
      .perfil {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
      }

      .perfil-header {
        display: flex;
        gap: 20px;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      .perfil-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 2px solid #30363d;
        flex-shrink: 0;
      }

      .perfil-nombre {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .perfil-login {
        color: #8b949e;
        font-size: 15px;
        margin-bottom: 8px;
      }
      .perfil-bio {
        color: #8b949e;
        font-size: 14px;
        line-height: 1.5;
      }

      .perfil-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        margin-bottom: 16px;
      }

      .stat {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 12px;
        text-align: center;
      }

      .stat-num {
        font-size: 22px;
        font-weight: 700;
        color: #58a6ff;
      }

      .stat-label {
        font-size: 11px;
        color: #8b949e;
        margin-top: 2px;
      }

      .perfil-info {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 13px;
        color: #8b949e;
      }

      .perfil-info span {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .btn-github {
        display: inline-block;
        margin-top: 16px;
        padding: 8px 16px;
        background: #21262d;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e6edf3;
        text-decoration: none;
        font-size: 13px;
      }

      /* REPOSITORIOS */
      .repos-titulo {
        font-size: 16px;
        color: #8b949e;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #21262d;
      }

      .repos-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 12px;
      }

      .repo-card {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 16px;
        transition: border-color 0.2s;
      }

      .repo-card:hover {
        border-color: #58a6ff;
      }

      .repo-nombre {
        color: #58a6ff;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
        text-decoration: none;
        display: block;
      }

      .repo-desc {
        color: #8b949e;
        font-size: 12px;
        line-height: 1.4;
        margin-bottom: 10px;
        min-height: 32px;
      }

      .repo-footer {
        display: flex;
        gap: 12px;
        font-size: 12px;
        color: #8b949e;
      }

      .repo-lang {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .lang-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #58a6ff;
        flex-shrink: 0;
      }

      /* COMPARADOR */
      .comparador {
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 20px;
        margin-top: 20px;
      }

      .comparador h2 {
        font-size: 16px;
        color: #8b949e;
        margin-bottom: 16px;
      }

      .comparador-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .comp-item {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 12px;
      }

      .comp-nombre {
        font-size: 14px;
        font-weight: 600;
        color: #58a6ff;
        margin-bottom: 8px;
      }

      .comp-stat {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #8b949e;
        padding: 4px 0;
        border-bottom: 1px solid #21262d;
      }

      .comp-stat:last-child {
        border-bottom: none;
      }
      .comp-stat span:last-child {
        color: #e6edf3;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <h1>🐙 Buscador de Usuarios GitHub</h1>
        <p>Proyecto integrador — JavaScript DOM + Eventos + Fetch + ES6+</p>
      </div>

      <!-- BUSCADOR -->
      <div class="buscador">
        <input
          type="text"
          id="input-busqueda"
          placeholder="Buscá un usuario de GitHub... (ej: ihlabs5)"
          autocomplete="off"
        />
        <button class="btn btn-primario" id="btn-buscar">Buscar</button>
        <button class="btn btn-secundario" id="btn-limpiar">Limpiar</button>
      </div>

      <!-- HISTORIAL -->
      <div class="historial" id="historial"></div>

      <!-- ESTADO -->
      <div id="estado"></div>

      <!-- RESULTADO PRINCIPAL -->
      <div id="resultado"></div>

      <!-- COMPARADOR (aparece cuando hay 2 usuarios en historial) -->
      <div id="comparador"></div>
    </div>

    <script>
      // ════════════════════════════════════════════
      // CLASE: GitHubService — maneja las llamadas a la API
      // ════════════════════════════════════════════
      class GitHubService {
        constructor() {
          this.baseURL = "https://api.github.com";
          this.cache = new Map(); // caché para no repetir peticiones
        }

        async obtenerUsuario(login) {
          const cacheKey = `user:${login}`;
          if (this.cache.has(cacheKey)) {
            console.log(`Cache hit: ${login}`);
            return this.cache.get(cacheKey);
          }

          const response = await fetch(`${this.baseURL}/users/${login}`);
          if (!response.ok) {
            if (response.status === 404)
              throw new Error(`Usuario "${login}" no encontrado`);
            if (response.status === 403)
              throw new Error("Límite de la API alcanzado. Esperá un minuto.");
            throw new Error(`Error ${response.status}`);
          }

          const usuario = await response.json();
          this.cache.set(cacheKey, usuario);
          return usuario;
        }

        async obtenerRepos(login) {
          const cacheKey = `repos:${login}`;
          if (this.cache.has(cacheKey)) return this.cache.get(cacheKey);

          const response = await fetch(
            `${this.baseURL}/users/${login}/repos?sort=stars&per_page=6`,
          );
          if (!response.ok) throw new Error(`Error al cargar repos`);

          const repos = await response.json();
          this.cache.set(cacheKey, repos);
          return repos;
        }

        async obtenerTodo(login) {
          const [usuario, repos] = await Promise.all([
            this.obtenerUsuario(login),
            this.obtenerRepos(login),
          ]);
          return { usuario, repos };
        }
      }

      // ════════════════════════════════════════════
      // CLASE: UIManager — maneja la interfaz
      // ════════════════════════════════════════════
      class UIManager {
        constructor() {
          this.estado = document.getElementById("estado");
          this.resultado = document.getElementById("resultado");
          this.historialEl = document.getElementById("historial");
          this.comparadorEl = document.getElementById("comparador");
        }

        mostrarCargando(msg = "Cargando...") {
          this.estado.innerHTML = `
            <div class="estado cargando">
              <span class="spinner"></span>${msg}
            </div>`;
          this.resultado.innerHTML = "";
        }

        mostrarError(msg) {
          this.estado.innerHTML = `
            <div class="estado error">❌ ${msg}</div>`;
        }

        limpiarEstado() {
          this.estado.innerHTML = "";
        }

        renderizarPerfil(usuario, repos) {
          this.limpiarEstado();

          const {
            name,
            login,
            avatar_url,
            bio,
            public_repos,
            followers,
            following,
            location,
            blog,
            html_url,
            created_at,
          } = usuario;

          const año = new Date(created_at).getFullYear();
          const totalStars = repos.reduce(
            (acc, r) => acc + r.stargazers_count,
            0,
          );

          this.resultado.innerHTML = `
            <div class="perfil">
              <div class="perfil-header">
                <img src="${avatar_url}" class="perfil-avatar" alt="${login}" />
                <div>
                  <div class="perfil-nombre">${name || login}</div>
                  <div class="perfil-login">@${login}</div>
                  ${bio ? `<div class="perfil-bio">${bio}</div>` : ""}
                </div>
              </div>

              <div class="perfil-stats">
                <div class="stat">
                  <div class="stat-num">${public_repos}</div>
                  <div class="stat-label">Repos</div>
                </div>
                <div class="stat">
                  <div class="stat-num">${followers}</div>
                  <div class="stat-label">Seguidores</div>
                </div>
                <div class="stat">
                  <div class="stat-num">${following}</div>
                  <div class="stat-label">Siguiendo</div>
                </div>
                <div class="stat">
                  <div class="stat-num">${totalStars}</div>
                  <div class="stat-label">⭐ Stars</div>
                </div>
              </div>

              <div class="perfil-info">
                ${location ? `<span>📍 ${location}</span>` : ""}
                ${blog ? `<span>🌐 ${blog}</span>` : ""}
                <span>📅 Desde ${año}</span>
              </div>

              <a href="${html_url}" target="_blank" class="btn-github">
                Ver en GitHub →
              </a>

              <div style="margin-top: 20px">
                <div class="repos-titulo">
                  Repositorios más destacados (${repos.length})
                </div>
                <div class="repos-grid">
                  ${repos.map((repo) => this.renderizarRepo(repo)).join("")}
                </div>
              </div>
            </div>
          `;
        }

        renderizarRepo(repo) {
          const {
            name,
            description,
            html_url,
            stargazers_count,
            forks_count,
            language,
          } = repo;

          return `
            <div class="repo-card">
              <a href="${html_url}" target="_blank" class="repo-nombre">${name}</a>
              <div class="repo-desc">
                ${description || "Sin descripción"}
              </div>
              <div class="repo-footer">
                ${
                  language
                    ? `<span class="repo-lang">
                      <span class="lang-dot"></span>${language}
                    </span>`
                    : ""
                }
                <span>⭐ ${stargazers_count}</span>
                <span>🍴 ${forks_count}</span>
              </div>
            </div>
          `;
        }

        actualizarHistorial(historial, onChipClick) {
          if (historial.size === 0) {
            this.historialEl.innerHTML = "";
            return;
          }

          this.historialEl.innerHTML = `
            <span style="font-size:12px; color:#8B949E; align-self:center">
              Recientes:
            </span>
            ${[...historial]
              .map(
                (login) => `
              <span class="chip" data-login="${login}">${login}</span>
            `,
              )
              .join("")}
          `;

          this.historialEl.querySelectorAll(".chip").forEach((chip) => {
            chip.addEventListener("click", () => {
              onChipClick(chip.dataset.login);
            });
          });
        }

        renderizarComparador(usuarios) {
          if (usuarios.length < 2) {
            this.comparadorEl.innerHTML = "";
            return;
          }

          const [u1, u2] = usuarios.slice(-2);

          const fila = (label, v1, v2) => {
            const ganador1 = v1 > v2;
            const ganador2 = v2 > v1;
            return `
              <div class="comp-stat">
                <span>${label}</span>
                <span style="${ganador1 ? "color:#58A6FF" : ""}">${v1}</span>
              </div>
              <div class="comp-stat">
                <span>${label}</span>
                <span style="${ganador2 ? "color:#58A6FF" : ""}">${v2}</span>
              </div>
            `;
          };

          this.comparadorEl.innerHTML = `
            <div class="comparador">
              <h2>⚔️ Comparador — últimos 2 usuarios buscados</h2>
              <div class="comparador-grid">
                <div class="comp-item">
                  <div class="comp-nombre">@${u1.login}</div>
                  <div class="comp-stat"><span>Repos</span><span>${u1.public_repos}</span></div>
                  <div class="comp-stat"><span>Seguidores</span><span>${u1.followers}</span></div>
                  <div class="comp-stat"><span>Siguiendo</span><span>${u1.following}</span></div>
                </div>
                <div class="comp-item">
                  <div class="comp-nombre">@${u2.login}</div>
                  <div class="comp-stat"><span>Repos</span><span>${u2.public_repos}</span></div>
                  <div class="comp-stat"><span>Seguidores</span><span>${u2.followers}</span></div>
                  <div class="comp-stat"><span>Siguiendo</span><span>${u2.following}</span></div>
                </div>
              </div>
            </div>
          `;
        }

        limpiarTodo() {
          this.estado.innerHTML = "";
          this.resultado.innerHTML = "";
          this.comparadorEl.innerHTML = "";
        }
      }

      // ════════════════════════════════════════════
      // CLASE: App — controlador principal
      // ════════════════════════════════════════════
      class App {
        constructor() {
          this.api = new GitHubService();
          this.ui = new UIManager();
          this.historial = new Set(); // usuarios buscados (sin duplicados)
          this.usuariosBuscados = []; // para el comparador
          this.buscando = false;

          this.inicializar();
        }

        inicializar() {
          const input = document.getElementById("input-busqueda");
          const btnBuscar = document.getElementById("btn-buscar");
          const btnLimpiar = document.getElementById("btn-limpiar");

          // Clic en botón buscar
          btnBuscar.addEventListener("click", () => {
            this.buscar(input.value.trim());
          });

          // Enter en el input
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              this.buscar(input.value.trim());
            }
          });

          // Limpiar
          btnLimpiar.addEventListener("click", () => {
            input.value = "";
            this.historial.clear();
            this.usuariosBuscados = [];
            this.ui.limpiarTodo();
            this.ui.actualizarHistorial(this.historial, () => {});
            input.focus();
          });

          // Foco inicial
          input.focus();
        }

        async buscar(login) {
          if (!login || this.buscando) return;

          this.buscando = true;
          const btnBuscar = document.getElementById("btn-buscar");
          btnBuscar.disabled = true;
          btnBuscar.textContent = "Buscando...";

          this.ui.mostrarCargando(`Buscando @${login}...`);

          try {
            const { usuario, repos } = await this.api.obtenerTodo(login);

            // Guardar en historial
            this.historial.add(login);
            this.usuariosBuscados.push(usuario);

            // Renderizar
            this.ui.renderizarPerfil(usuario, repos);
            this.ui.actualizarHistorial(this.historial, (loginChip) => {
              document.getElementById("input-busqueda").value = loginChip;
              this.buscar(loginChip);
            });
            this.ui.renderizarComparador(this.usuariosBuscados);
          } catch (error) {
            this.ui.mostrarError(error.message);
          } finally {
            this.buscando = false;
            btnBuscar.disabled = false;
            btnBuscar.textContent = "Buscar";
          }
        }
      }

      // ── INICIAR LA APP ─────────────────────────────
      const app = new App();
    </script>
  </body>
</html>
